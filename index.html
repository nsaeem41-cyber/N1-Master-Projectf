<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N One | بوابة الدخول الملكية</title>
    
    <link rel="icon" type="image/png" href="n_one_logo_new.png">

    <style>
        /* ================= الألوان الأساسية ================= */
        :root {
            --bg-dark: #050814;
            --primary: #0f172a;
            --gold: #d4af37;
            --gold-light: #fef08a;
            --gold-dark: #a17f1a;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-dark);
            overflow: hidden;
            position: relative;
        }

        /* ================= الخلفية المتحركة (Nebula Animation) ================= */
        .background-anim {
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, rgba(15, 23, 42, 0) 50%),
                        radial-gradient(circle at 80% 20%, rgba(14, 165, 233, 0.05) 0%, transparent 40%);
            animation: slowSpin 30s linear infinite;
            z-index: 0;
        }

        @keyframes slowSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ================= بطاقة الدخول الزجاجية ================= */
        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 420px;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* إضاءة خلف البطاقة */
        .login-wrapper::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, var(--gold), var(--primary), var(--gold-dark));
            border-radius: 26px;
            z-index: -1;
            filter: blur(15px);
            opacity: 0.5;
            animation: pulseGlow 4s infinite alternate;
        }

        @keyframes pulseGlow {
            0% { opacity: 0.3; }
            100% { opacity: 0.7; }
        }

        .login-card {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 50px 40px;
            border-radius: 24px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        /* ================= النصوص واللوجو ================= */
        .brand-logo {
            font-size: 50px;
            font-weight: 900;
            color: var(--text-main);
            margin: 0 0 5px 0;
            letter-spacing: 2px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }
        .brand-logo span { color: var(--gold); }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 40px;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            display: inline-block;
            padding-bottom: 10px;
        }

        /* ================= الحقول (Inputs) ================= */
        .input-group {
            margin-bottom: 25px;
            text-align: right;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--gold-light);
            font-size: 13px;
            font-weight: bold;
        }

        .input-group input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid transparent;
            border-bottom: 2px solid rgba(212, 175, 55, 0.3);
            border-radius: 12px;
            color: white;
            font-size: 15px;
            font-weight: bold;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .input-group input:focus {
            background: rgba(212, 175, 55, 0.05);
            border-color: var(--gold);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transform: translateY(-2px);
        }

        /* ================= زر الدخول (الذهبي الفاخر) ================= */
        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(to right, var(--gold), var(--gold-dark));
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 900;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .btn-login::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.5), transparent);
            transform: skewX(-20deg);
            transition: 0.5s;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.5);
        }

        .btn-login:hover::after {
            left: 150%;
        }

        .btn-login:active {
            transform: translateY(1px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }

        .btn-login:disabled {
            background: #334155;
            color: #94a3b8;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* ================= رسائل الخطأ ================= */
        .msg-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: bold;
            display: none;
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }

        .footer {
            margin-top: 30px;
            font-size: 11px;
            color: #64748b;
            font-weight: bold;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="background-anim"></div>

    <div class="login-wrapper">
        <div class="login-card">
            
            <h1 class="brand-logo">N <span>One</span></h1>
            <div class="subtitle">بوابة الوصول الموحدة</div>

            <div class="input-group">
                <label>معرف الدخول الرسمي</label>
                <input type="text" id="username" placeholder="أدخل المعرف الخاص بك" autocomplete="off">
            </div>

            <div class="input-group">
                <label>رمز المرور</label>
                <input type="password" id="password" placeholder="أدخل رمز المرور السري">
            </div>

            <button class="btn-login" id="loginBtn">تسجيل الدخول</button>

            <div id="msg" class="msg-box"></div>

            <div class="footer">
                &copy; 2026 N ONE GLOBAL SYSTEMS<br>
                SECURE ACCESS PROTOCOL
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // إعدادات قاعدة البيانات الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyC2dqEdbq5cN49leWIcjsTAq6l6KavN_sQ",
            authDomain: "n-one-global.firebaseapp.com",
            databaseURL: "https://n-one-global-default-rtdb.firebaseio.com",
            projectId: "n-one-global",
            storageBucket: "n-one-global.firebasestorage.app",
            messagingSenderId: "627262885530",
            appId: "1:627262885530:web:bc0ae0d748c61ed91b5923"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // عند تحميل الصفحة
        window.addEventListener('DOMContentLoaded', () => {
            // التوجيه التلقائي إذا كان مسجل دخول مسبقاً
            const activeSession = localStorage.getItem('currentUser');
            if (activeSession) {
                const userData = JSON.parse(activeSession);
                if (userData.role === 'admin') {
                    window.location.replace('admin.html');
                    return;
                } else if (userData.role === 'client' || userData.Client_Role === 'client') {
                    window.location.replace('client.html');
                    return;
                }
            }

            // تنظيف أي جلسات كباتن قديمة 
            localStorage.removeItem('n1_captain_session');

            // ربط زر الدخول
            const loginBtn = document.getElementById('loginBtn');
            loginBtn.addEventListener('click', performLogin);

            // تفعيل زر الدخول عند الضغط على Enter في لوحة المفاتيح
            document.getElementById('password').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    performLogin();
                }
            });
            document.getElementById('username').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    document.getElementById('password').focus();
                }
            });
        });

        // عملية تسجيل الدخول
        async function performLogin() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            const btn = document.getElementById('loginBtn');
            const msgBox = document.getElementById('msg');

            msgBox.style.display = 'none';

            if (!u || !p) {
                showError("يرجى إدخال المعرف وكلمة المرور.");
                return;
            }

            // تغيير شكل الزر أثناء التحميل
            btn.innerHTML = "جاري التحقق... ⏳";
            btn.disabled = true;

            try {
                const dbRef = ref(db);
                // بحث مباشر وسريع في عقدة المستخدمين فقط (الإدارة والشركات)
                let snapshot = await get(child(dbRef, `users/${u}`));
                
                if(snapshot.exists()) {
                    const userRecord = snapshot.val();
                    
                    const dbPass = userRecord.Client_Pass || userRecord.pass || "";
                    let encodedP = "";
                    try { encodedP = btoa(p); } catch(e) {}

                    // مطابقة كلمة المرور
                    if (dbPass === p || dbPass === encodedP) {
                        
                        const status = userRecord.Client_Status || userRecord.status;
                        if (status !== 'active') {
                            showError("عذراً، هذا الحساب مجمد يرجى مراجعة الإدارة.");
                            resetBtn();
                            return;
                        }

                        // إنشاء جلسة الدخول
                        const secureSession = {
                            ...userRecord,
                            user: userRecord.Client_User || userRecord.user,
                            pass: dbPass,
                            name: userRecord.Client_Name || userRecord.name,
                            role: userRecord.Client_Role || userRecord.role,
                            type: userRecord.Client_Type || userRecord.type,
                            status: status,
                            loginTime: Date.now()
                        };
                        
                        localStorage.setItem('currentUser', JSON.stringify(secureSession));
                        
                        // توجيه ناجح
                        btn.innerHTML = "تم الدخول بنجاح ✅";
                        btn.style.background = "linear-gradient(to right, #10b981, #059669)";
                        
                        setTimeout(() => {
                            if (secureSession.role === 'admin') {
                                window.location.replace('admin.html');
                            } else {
                                window.location.replace('client.html');
                            }
                        }, 500);

                    } else {
                        showError("بيانات الدخول غير صحيحة.");
                        resetBtn();
                    }
                } else {
                    showError("المعرف غير موجود في النظام.");
                    resetBtn();
                }

            } catch (err) {
                console.error(err);
                showError("خطأ في الاتصال بالسيرفر. تأكد من الإنترنت.");
                resetBtn();
            }
        }

        // عرض رسالة الخطأ
        function showError(text) {
            const msg = document.getElementById('msg');
            msg.innerText = text;
            msg.style.display = 'block';
        }

        // إعادة الزر لوضعه الطبيعي
        function resetBtn() {
            const btn = document.getElementById('loginBtn');
            btn.innerHTML = "تسجيل الدخول";
            btn.disabled = false;
        }
    </script>
</body>
</html>
