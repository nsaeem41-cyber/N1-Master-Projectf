<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N One | بوابة الدخول المركزية</title>
    
    <link rel="icon" type="image/png" href="n_one_logo_new.png">

    <meta property="og:title" content="N One | بوابة الدخول المركزية">
    <meta property="og:description" content="نظام الوصول الآمن - الإدارة العليا والشركات الشريكة">
    <meta property="og:image" content="n_one_logo_new.png">
    <meta property="og:type" content="website">
    
    <style>
        /* ================= تصميم البوابة الإمبراطورية (Royal & Official) ================= */
        :root {
            --primary: #0f172a;
            --accent: #1e293b;
            --gold: #d4af37;
            --glass-bg: rgba(15, 23, 42, 0.85);
            --glass-border: rgba(212, 175, 55, 0.3);
            --input-bg: rgba(255, 255, 255, 0.03);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, #1e293b, #0f172a, #000000);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        /* مؤثرات الخلفية الملكية */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(212, 175, 55, 0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(212, 175, 55, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 0;
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            width: 90%;
            max-width: 420px;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.05);
            text-align: center;
            border: 1px solid var(--glass-border);
            border-top: 4px solid var(--gold);
            position: relative;
            z-index: 1;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand h1 { 
            margin: 0; 
            font-size: 42px; 
            font-weight: 900; 
            color: var(--text-main); 
            letter-spacing: 2px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .gold { color: var(--gold); }
        
        .subtitle { 
            color: var(--gold); 
            font-size: 13px; 
            margin-bottom: 35px; 
            margin-top: 10px;
            font-weight: 900; 
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            display: inline-block;
            padding-bottom: 8px;
        }

        .input-group { margin-bottom: 25px; text-align: right; }
        
        label { 
            display: block; 
            margin-bottom: 10px; 
            font-weight: 800; 
            font-size: 13px; 
            color: var(--text-muted); 
            letter-spacing: 0.5px;
        }
        
        input {
            width: 100%; 
            padding: 16px 18px; 
            border: 1px solid rgba(212, 175, 55, 0.2); 
            border-radius: 12px;
            font-size: 15px; 
            background: var(--input-bg); 
            color: var(--text-main);
            outline: none; 
            transition: all 0.3s ease;
            box-sizing: border-box; 
            font-weight: bold;
            font-family: inherit;
        }
        
        input:focus { 
            border-color: var(--gold); 
            background: rgba(255, 255, 255, 0.08); 
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.15); 
        }

        .btn-login {
            width: 100%; 
            padding: 18px; 
            background: linear-gradient(135deg, #d4af37, #b48608); 
            color: var(--primary);
            border: none; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: 900;
            cursor: pointer; 
            transition: all 0.3s ease; 
            margin-top: 10px;
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.2);
            letter-spacing: 1px;
        }
        
        .btn-login:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.4); 
            background: linear-gradient(135deg, #e5c158, #c59719);
        }

        .footer { 
            margin-top: 35px; 
            font-size: 11px; 
            color: #475569; 
            border-top: 1px solid rgba(255, 255, 255, 0.05); 
            padding-top: 20px; 
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* نظام الإشعارات الذكي المنسدل */
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .app-toast { background: linear-gradient(135deg, #1e293b, #0f172a); color: #f8fafc; border-left: 4px solid #d4af37; padding: 16px 25px; border-radius: 12px; font-weight: bold; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transform: translateX(120%); animation: slideIn 0.4s forwards, fadeOut 0.4s forwards 3.6s; font-size: 14px; display: flex; align-items: center; gap: 10px; border-right: 1px solid #334155; border-top: 1px solid #334155; border-bottom: 1px solid #334155; }
        @keyframes slideIn { to { transform: translateX(0); } }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(-10px); } }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div class="login-card">
        
        <div class="brand">
            <h1>N <span class="gold">One</span></h1>
        </div>

        <div class="subtitle">بوابة الدخول المركزية (HQ)</div>

        <div class="input-group">
            <label>معرف الدخول الرسمي</label>
            <input type="text" id="username" placeholder="أدخل المعرف الخاص بك" autocomplete="off">
        </div>

        <div class="input-group">
            <label>رمز المرور السري</label>
            <input type="password" id="password" placeholder="أدخل رمز المرور" autocomplete="off">
        </div>

        <button class="btn-login" onclick="loginNow()" id="loginBtn">تسجيل الدخول للنظام</button>

        <div class="footer">
            &copy; 2026 N ONE GLOBAL SYSTEMS<br>
            HQ SECURE ACCESS PROTOCOL
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC2dqEdbq5cN49leWIcjsTAq6l6KavN_sQ",
            authDomain: "n-one-global.firebaseapp.com",
            databaseURL: "https://n-one-global-default-rtdb.firebaseio.com",
            projectId: "n-one-global",
            storageBucket: "n-one-global.firebasestorage.app",
            messagingSenderId: "627262885530",
            appId: "1:627262885530:web:bc0ae0d748c61ed91b5923"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // نظام الإشعارات الذكي
        window.showAppToast = function(msg, isError = false) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'app-toast';
            if(isError) toast.style.borderLeftColor = '#ef4444';
            toast.innerHTML = (isError ? '⚠️ ' : '🛡️ ') + msg;
            container.appendChild(toast);
            setTimeout(() => { if(toast.parentNode) toast.remove(); }, 4000);
        };

        window.onload = function() {
            // تنظيف الذاكرة الميتة والجلسات السابقة عند فتح البوابة لضمان الأمان
            localStorage.removeItem('currentUser');
            localStorage.removeItem('n1_captain_session');
        }

        window.loginNow = async function() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            const btn = document.getElementById('loginBtn');

            if (!u || !p) {
                showAppToast("يرجى إدخال المعرف ورمز المرور للمتابعة.", true);
                return;
            }

            btn.innerHTML = "جاري التحقق من الصلاحيات...";
            btn.disabled = true;

            try {
                const dbRef = ref(db);
                // فلترة ألماسية: البحث يتم فقط في جدول الإدارات والشركات (users)
                const snapshot = await get(child(dbRef, `users/${u}`));
                
                if(snapshot.exists()) {
                    const userRecord = snapshot.val();
                    const dbPass = userRecord.Client_Pass || userRecord.pass || "";
                    let encodedP = "";
                    try { encodedP = btoa(p); } catch(e) {}

                    if (dbPass === p || dbPass === encodedP) {
                        const status = userRecord.Client_Status || userRecord.status;
                        const role = userRecord.Client_Role || userRecord.role;

                        if (status !== 'active') {
                            showAppToast("عذراً، هذا الحساب معلق. يرجى مراجعة الإدارة العليا.", true);
                            resetBtn();
                            return;
                        }

                        // منع دخول أي طرف غير الإدارة العليا أو الشركات (Client/Admin)
                        if(role !== 'admin' && role !== 'client') {
                            showAppToast("غير مصرح لك بالدخول. هذه البوابة مخصصة للإدارة المركزية فقط.", true);
                            resetBtn();
                            return;
                        }

                        const secureSession = {
                            ...userRecord,
                            user: userRecord.Client_User || userRecord.user,
                            pass: userRecord.Client_Pass || userRecord.pass,
                            name: userRecord.Client_Name || userRecord.name,
                            role: role,
                            type: userRecord.Client_Type || userRecord.type,
                            status: status,
                            _node: "users",
                            loginTime: Date.now()
                        };
                        
                        localStorage.setItem('currentUser', JSON.stringify(secureSession));
                        
                        showAppToast("تم التحقق بنجاح. جاري فتح الخزنة...");
                        
                        // توجيه ذكي حسب الصلاحية
                        setTimeout(() => {
                            if(role === 'admin') {
                                window.location.replace('admin.html');
                            } else {
                                window.location.replace('client.html');
                            }
                        }, 1200);

                    } else {
                        showAppToast("بيانات الدخول (المعرف أو رمز المرور) غير صحيحة.", true);
                        resetBtn();
                    }
                } else {
                    showAppToast("المعرف غير مسجل في النظام المركزي.", true);
                    resetBtn();
                }

            } catch (err) {
                showAppToast("خطأ في الاتصال بالسيرفر. يرجى التحقق من الشبكة.", true);
                resetBtn();
            }
        }

        function resetBtn() {
            const btn = document.getElementById('loginBtn');
            btn.innerHTML = "تسجيل الدخول للنظام";
            btn.disabled = false;
        }
    </script>
</body>
</html>
