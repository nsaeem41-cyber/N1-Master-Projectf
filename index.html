<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N One | بوابة الدخول المتقدمة</title>
    
    <link rel="icon" type="image/png" href="n_one_logo_new.png">

    <style>
        /* ================= إعدادات الشاشة الأساسية ================= */
        :root {
            --primary: #0f172a;
            --gold: #d4af37;
            --gold-light: #fef08a;
            --neon-blue: #0ea5e9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #050814;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* ================= الأجسام الطافية في الخلفية ================= */
        .bg-shapes {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            background: linear-gradient(135deg, rgba(212,175,55,0.2), rgba(14,165,233,0.2));
            box-shadow: 0 0 30px rgba(212,175,55,0.2);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(212,175,55,0.3);
            animation: float 15s infinite linear;
        }

        /* أشكال هندسية بأحجام وأماكن مختلفة */
        .shape:nth-child(1) { width: 100px; height: 100px; top: 10%; left: 15%; border-radius: 20%; animation-duration: 20s; transform: rotate(45deg); }
        .shape:nth-child(2) { width: 150px; height: 150px; top: 60%; left: 80%; border-radius: 50%; animation-duration: 25s; animation-direction: reverse; }
        .shape:nth-child(3) { width: 80px; height: 80px; top: 70%; left: 10%; border-radius: 30%; animation-duration: 18s; }
        .shape:nth-child(4) { width: 200px; height: 200px; top: -5%; left: 70%; border-radius: 40%; animation-duration: 30s; transform: rotate(20deg); }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.5; }
            50% { transform: translateY(-40px) rotate(180deg); opacity: 1; }
            100% { transform: translateY(0) rotate(360deg); opacity: 0.5; }
        }

        /* ================= بطاقة الدخول المركزية (الزجاج الثابت والأنيق) ================= */
        .card-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .login-card {
            width: 90%;
            max-width: 400px;
            padding: 45px 35px;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            text-align: center;
            position: relative;
            /* أضفنا إطاراً ذهبياً ثابتاً وفخماً بدلاً من الإطار المتحرك المزعج */
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-top: 4px solid var(--gold);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.1);
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ================= العناصر الداخلية ================= */
        .brand {
            margin-bottom: 5px;
        }
        .brand h1 { 
            margin: 0; font-size: 45px; font-weight: 900; color: #fff; 
            letter-spacing: 2px; text-shadow: 0 10px 20px rgba(0,0,0,0.8);
        }
        .gold { color: var(--gold); text-shadow: 0 0 15px rgba(212,175,55,0.6); }
        
        .subtitle { 
            color: var(--neon-blue); font-size: 13px; margin-bottom: 35px; 
            font-weight: 900; letter-spacing: 2px; text-transform: uppercase;
            text-shadow: 0 0 10px rgba(14,165,233,0.5);
        }

        .input-group { 
            margin-bottom: 25px; text-align: right; 
        }
        
        label { 
            display: block; margin-bottom: 10px; font-weight: 800; 
            font-size: 13px; color: #cbd5e1; 
        }
        
        input {
            width: 100%; padding: 16px 18px; 
            border: 1px solid rgba(212, 175, 55, 0.2); 
            border-radius: 15px; font-size: 15px; 
            background: rgba(255, 255, 255, 0.03); 
            color: white; outline: none; 
            transition: all 0.3s ease; box-sizing: border-box; 
            font-weight: bold;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.3);
            font-family: inherit;
        }
        
        input:focus { 
            border-color: var(--gold); 
            background: rgba(212, 175, 55, 0.05); 
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2), inset 0 2px 10px rgba(0,0,0,0.3); 
        }

        .btn-login {
            width: 100%; padding: 18px; 
            background: linear-gradient(135deg, var(--gold), #b48608); 
            color: #000; border: none; border-radius: 15px; 
            font-size: 16px; font-weight: 900; cursor: pointer; 
            transition: all 0.3s ease; margin-top: 10px;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
            text-transform: uppercase; letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        /* لمعة الزر عند التمرير */
        .btn-login::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-20deg); transition: 0.5s;
        }
        
        .btn-login:hover::before { left: 150%; }
        .btn-login:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.5); 
        }
        
        .btn-login:disabled { background: #475569; color: #94a3b8; cursor: not-allowed; box-shadow: none; transform: none; }

        .msg-box {
            margin-top: 20px; padding: 15px; border-radius: 10px; 
            font-size: 13px; display: none; font-weight: bold;
        }
        .error { 
            background: rgba(239, 68, 68, 0.1); color: #fca5a5; 
            border: 1px solid rgba(239, 68, 68, 0.3); border-right: 4px solid #ef4444;
        }
        
        .footer { 
            margin-top: 35px; font-size: 11px; color: #475569; 
            padding-top: 20px; font-weight: bold; letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="bg-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <div class="card-container">
        <div class="login-card">
            
            <div class="brand">
                <h1>N <span class="gold">One</span></h1>
            </div>

            <div class="subtitle">بوابة الدخول الرسمية</div>

            <div class="input-group">
                <label>معرف الدخول الرسمي</label>
                <input type="text" id="username" placeholder="أدخل المعرف الخاص بك" autocomplete="off">
            </div>

            <div class="input-group">
                <label>رمز المرور</label>
                <input type="password" id="password" placeholder="أدخل رمز المرور السري">
            </div>

            <button class="btn-login" id="loginBtn">تسجيل الدخول للنظام</button>

            <div id="msg" class="msg-box error"></div>

            <div class="footer">
                &copy; 2026 N ONE GLOBAL SYSTEMS<br>
                SECURE ACCESS PROTOCOL
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC2dqEdbq5cN49leWIcjsTAq6l6KavN_sQ",
            authDomain: "n-one-global.firebaseapp.com",
            databaseURL: "https://n-one-global-default-rtdb.firebaseio.com",
            projectId: "n-one-global",
            storageBucket: "n-one-global.firebasestorage.app",
            messagingSenderId: "627262885530",
            appId: "1:627262885530:web:bc0ae0d748c61ed91b5923"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // عند تحميل الصفحة
        window.addEventListener('DOMContentLoaded', () => {
            const activeSession = localStorage.getItem('currentUser');
            if (activeSession) {
                const userData = JSON.parse(activeSession);
                if (userData.role === 'admin') {
                    window.location.replace('admin.html');
                    return;
                } else if (userData.role === 'client' || userData.Client_Role === 'client') {
                    window.location.replace('client.html');
                    return;
                }
            }

            // تنظيف الجلسات القديمة
            localStorage.removeItem('n1_captain_session');

            const loginBtn = document.getElementById('loginBtn');
            loginBtn.addEventListener('click', performLogin);

            document.getElementById('password').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    performLogin();
                }
            });
            document.getElementById('username').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    document.getElementById('password').focus();
                }
            });
        });

        // دالة الدخول الصاروخية
        async function performLogin() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            const btn = document.getElementById('loginBtn');
            const msgBox = document.getElementById('msg');

            msgBox.style.display = 'none';

            if (!u || !p) {
                showError("يرجى إدخال المعرف وكلمة المرور.");
                return;
            }

            btn.innerHTML = "جاري التحقق... ⏳";
            btn.disabled = true;

            try {
                const dbRef = ref(db);
                // بحث في جدول المستخدمين والشركات
                let snapshot = await get(child(dbRef, `users/${u}`));
                
                if(snapshot.exists()) {
                    const userRecord = snapshot.val();
                    
                    const dbPass = userRecord.Client_Pass || userRecord.pass || "";
                    let encodedP = "";
                    try { encodedP = btoa(p); } catch(e) {}

                    if (dbPass === p || dbPass === encodedP) {
                        
                        const status = userRecord.Client_Status || userRecord.status;
                        if (status !== 'active') {
                            showError("عذراً، هذا الحساب مجمد يرجى مراجعة الإدارة.");
                            resetBtn();
                            return;
                        }

                        const secureSession = {
                            ...userRecord,
                            user: userRecord.Client_User || userRecord.user,
                            pass: dbPass,
                            name: userRecord.Client_Name || userRecord.name,
                            role: userRecord.Client_Role || userRecord.role,
                            type: userRecord.Client_Type || userRecord.type,
                            status: status,
                            loginTime: Date.now()
                        };
                        
                        localStorage.setItem('currentUser', JSON.stringify(secureSession));
                        
                        btn.innerHTML = "تم الدخول بنجاح ✅";
                        btn.style.background = "linear-gradient(135deg, #10b981, #059669)";
                        
                        setTimeout(() => {
                            if (secureSession.role === 'admin') {
                                window.location.replace('admin.html');
                            } else {
                                window.location.replace('client.html');
                            }
                        }, 500);

                    } else {
                        showError("بيانات الدخول غير صحيحة.");
                        resetBtn();
                    }
                } else {
                    showError("المعرف غير موجود في النظام.");
                    resetBtn();
                }

            } catch (err) {
                console.error(err);
                showError("خطأ في الاتصال بالسيرفر. تأكد من الإنترنت.");
                resetBtn();
            }
        }

        function showError(text) {
            const msg = document.getElementById('msg');
            msg.innerText = text;
            msg.style.display = 'block';
        }

        function resetBtn() {
            const btn = document.getElementById('loginBtn');
            btn.innerHTML = "تسجيل الدخول للنظام";
            btn.disabled = false;
        }
    </script>
</body>
</html>
