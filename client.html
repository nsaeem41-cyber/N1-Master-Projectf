<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N One | Modern Glassmorphism B2B Dashboard</title>
    <style>
        /* ================= N One | Modern Glassmorphism Premium Decor ================= */
        :root {
            --primary-bg: #0b1120;
            --card-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --gold: #facc15;
            --gold-glow: rgba(250, 204, 21, 0.2);
            --accent-blue: #22d3ee;
            --danger: #ef4444;
            --success: #10b981;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            background: radial-gradient(circle at top right, #1e293b, #0b1120);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            user-select: none;
            min-height: 100vh;
        }

        /* --- Navbar --- */
        .navbar {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .brand { 
            font-size: 28px; 
            font-weight: 900; 
            letter-spacing: 1px; 
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .brand-logo { color: var(--gold); text-shadow: 0 0 20px var(--gold-glow); }

        .btn-logout {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 10px 20px;
            border-radius: 14px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-logout:hover { background: var(--danger); color: white; box-shadow: 0 0 20px rgba(239, 68, 68, 0.4); }

        /* --- Container & Cards --- */
        .container { max-width: 1500px; margin: 30px auto; padding: 0 30px; }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .card-header {
            font-size: 20px;
            font-weight: 900;
            color: var(--text-main);
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* --- Tabs --- */
        .tabs { display: flex; gap: 15px; margin-bottom: 30px; }
        .tab-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
            padding: 14px 28px;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 800;
            transition: 0.3s;
        }
        .tab-btn.active {
            background: var(--gold);
            color: #000;
            border-color: var(--gold);
            box-shadow: 0 0 25px var(--gold-glow);
        }

        /* --- Quick Control (Remote) --- */
        .slim-remote-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            background: rgba(0,0,0,0.2);
            padding: 25px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
        }
        .remote-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.02);
            padding: 12px 18px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
        }

        /* --- Table --- */
        .table-wrapper { border-radius: 24px; overflow: hidden; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(255,255,255,0.05); padding: 22px; text-align: right; color: var(--gold); font-size: 14px; font-weight: 900; }
        td { padding: 20px; border-bottom: 1px solid var(--glass-border); font-size: 14px; color: var(--text-dim); }
        tr:hover td { background: rgba(255,255,255,0.02); color: white; }

        /* --- Custom Inputs --- */
        input, select {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid var(--glass-border) !important;
            color: white !important;
            padding: 15px !important;
            border-radius: 16px !important;
            outline: none;
        }
        input:focus { border-color: var(--gold) !important; box-shadow: 0 0 20px var(--gold-glow) !important; }

        /* --- Toggles --- */
        .switch { position: relative; width: 48px; height: 24px; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.1); transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: var(--accent-blue); box-shadow: 0 0 15px var(--accent-blue); }
        input:checked + .slider:before { transform: translateX(24px); }
    </style>
</head>
<body>
    <!-- 
        ملاحظة للمبرمج:
        هذا الكود هو 'ديكور' (Skin/Theme). 
        يرجى نسخ قسم الـ <style> ووضعه في مشروعك الأصلي.
        لم يتم تغيير أي كلاسات أو معرفات (IDs) لضمان توافق وظائف Firebase والـ JavaScript.
    -->
</body>
</html>
