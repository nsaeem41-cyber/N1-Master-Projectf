<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N One | مصفوفة الأسعار المركزية (Pricing Matrix)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --primary: #020617; 
            --gold: #D4AF37; 
            --success: #10b981; 
            --danger: #ef4444; 
            --night: #4f46e5; /* Indigo for night mode */
        }
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--primary); 
            color: #e2e8f0; 
            overflow-x: hidden; 
            background-image: radial-gradient(circle at 50% 50%, rgba(30, 58, 138, 0.05) 0%, transparent 80%), linear-gradient(rgba(15, 23, 42, 0.95), rgba(15, 23, 42, 0.95)), url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); 
            user-select: none; 
        }

        /* التنسيقات الألماسية للواجهة */
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px); border: 1px solid rgba(212, 175, 55, 0.15); box-shadow: 0 4px 20px 0 rgba(0, 0, 0, 0.4); }
        .gold-glow { text-shadow: 0 0 8px rgba(212, 175, 55, 0.4); color: var(--gold); }
        .neon-button-gold { background: linear-gradient(45deg, var(--gold), #F9E27D); color: #020617; box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); transition: all 0.2s ease; }
        .neon-button-gold:hover { transform: translateY(-2px); box-shadow: 0 0 20px rgba(212, 175, 55, 0.5); }
        .neon-button-success { background: linear-gradient(45deg, #10b981, #34d399); color: #020617; box-shadow: 0 0 15px rgba(16, 185, 129, 0.3); transition: all 0.2s ease; }
        .neon-button-success:hover { transform: translateY(-2px); box-shadow: 0 0 20px rgba(16, 185, 129, 0.5); }
        
        .vault-input { background: rgba(2, 6, 23, 0.9); border: 1px solid rgba(212, 175, 55, 0.2); color: #F9E27D; font-family: monospace; transition: 0.2s;}
        .vault-input:focus { border-color: var(--gold); outline: none; box-shadow: 0 0 5px rgba(212, 175, 55, 0.2);}
        
        /* Sci-Fi Toggle */
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #1e293b; transition: .3s; border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 34px;}
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: #cbd5e1; transition: .3s; box-shadow: 0 0 5px rgba(255, 255, 255, 0.2); border-radius: 50%;}
        input:checked + .slider { background-color: var(--primary); border-color: var(--night); }
        input:checked + .slider:before { transform: translateX(22px); background-color: #818cf8; box-shadow: 0 0 10px rgba(79, 70, 229, 0.8);}

        /* كروت التسعير (Price Cards) */
        .price-card { transition: all 0.3s ease; position: relative; overflow: hidden; }
        .price-card:hover { transform: translateY(-3px); border-color: var(--gold); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .price-card.gold-offer { background: linear-gradient(135deg, rgba(212,175,55,0.1), rgba(212,175,55,0.05)); border: 1px solid var(--gold); box-shadow: 0 0 15px rgba(212,175,55,0.15); }
        
        .color-indicator { width: 4px; height: 100%; position: absolute; right: 0; top: 0; border-radius: 0 12px 12px 0; }
        .low-price { background: #10b981; box-shadow: 0 0 10px #10b981; } 
        .med-price { background: #f59e0b; box-shadow: 0 0 10px #f59e0b; } 
        .high-price { background: #ef4444; box-shadow: 0 0 10px #ef4444; } 

        .night-badge { position: absolute; top: -8px; right: -8px; font-size: 9px; font-weight: 900; background: var(--night); color: white; padding: 3px 8px; border-radius: 6px; box-shadow: 0 0 10px rgba(79, 70, 229, 0.6); pointer-events: none; z-index: 10; letter-spacing: 1px;}
        .offer-timer { font-size: 10px; font-weight: 900; font-family: monospace; position: absolute; bottom: 8px; left: 15px; padding: 3px 8px; border-radius: 8px; }

        .area-name-input { border: none; font-weight: 900; font-size: 15px; color: white; flex: 1; outline: none; background: transparent; transition: 0.3s; padding: 8px; width: 100%; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .area-name-input:focus { border-bottom-color: var(--gold); }
        .price-val-input { width: 80px; padding: 8px; border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 8px; text-align: center; font-weight: 900; color: var(--gold); outline: none; font-size: 16px; transition: 0.3s; background: rgba(2, 6, 23, 0.8); }
        .price-val-input:focus { border-color: var(--success); box-shadow: 0 0 10px rgba(16, 185, 129, 0.3); color: var(--success); }
        .price-val-input:disabled { background: rgba(255,255,255,0.05); color: #64748b; border-color: rgba(255,255,255,0.1); cursor: not-allowed; }

        /* الأزرار الدائرية الصغيرة */
        .mini-circle-btn { width: 34px; height: 34px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; font-size: 14px; background: rgba(15, 23, 42, 0.8); color: #cbd5e1; }
        .mini-circle-btn:hover { background: rgba(212, 175, 55, 0.1); border-color: var(--gold); color: var(--gold); transform: translateY(-2px); }
        .btn-offer.active { color: #f59e0b; border-color: #f59e0b; background: rgba(245, 158, 11, 0.1); box-shadow: 0 0 10px rgba(245, 158, 11, 0.2); }

        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .app-toast { background: rgba(15, 23, 42, 0.98); border: 1px solid var(--gold); color: #f8fafc; padding: 15px 25px; border-radius: 12px; font-weight: bold; box-shadow: 0 8px 20px rgba(0,0,0,0.4); transform: translateX(120%); animation: slideIn 0.3s forwards, fadeOut 0.3s forwards 3.6s; font-size: 13px; display: flex; align-items: center; gap: 10px; border-right-width: 4px; border-right-color: var(--gold);}
        @keyframes slideIn { to { transform: translateX(0); } } @keyframes fadeOut { to { opacity: 0; transform: translateY(-10px); } }

        /* الطباعة */
        .print-header { display: none; text-align: center; border-bottom: 2px solid var(--gold); padding-bottom: 15px; margin-bottom: 25px; }
        @media print {
            body { background: white; color: black; -webkit-print-color-adjust: exact; }
            .navbar, .sidebar, .card-tools, .night-badge { display: none !important; }
            .layout-wrapper { display: block; padding: 0; margin: 0; }
            .print-header { display: block; }
            .matrix-container { display: block; column-count: 2; column-gap: 25px; }
            .price-card { break-inside: avoid; border: 1px solid #cbd5e1 !important; box-shadow: none !important; margin-bottom: 12px; padding: 10px 15px; border-radius: 10px; background: white !important; }
            .area-name-input, .price-val-input { border: none !important; background: transparent !important; color: black !important; font-size: 14px; }
            .price-val-input { text-align: left; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="toast-container"></div>

    <nav id="main-nav" class="glass-panel h-20 flex justify-between items-center px-6 md:px-10 border-b-4 border-b-yellow-500 transition-all duration-500 z-50 sticky top-0">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-yellow-500 to-yellow-700 flex items-center justify-center shadow-[0_0_15px_rgba(212,175,55,0.4)]">
                <i class="fas fa-gem text-slate-900 text-xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-black text-white tracking-widest flex items-center gap-2">N <span class="gold-glow">ONE</span> MATRIX</h1>
                <span id="header-company-name" class="text-[10px] text-yellow-500 font-mono tracking-[0.2em] bg-yellow-500/10 px-2 py-0.5 rounded border border-yellow-500/20">جاري التحميل...</span>
            </div>
        </div>
        <button onclick="window.close()" class="bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-600 px-4 py-2 rounded-xl text-sm font-bold transition-all flex items-center gap-2">
            <i class="fas fa-times"></i> إغلاق
        </button>
    </nav>

    <div class="layout-wrapper flex flex-col lg:flex-row max-w-[1600px] mx-auto w-full p-4 md:p-8 gap-6 flex-1 items-start">
        
        <aside class="sidebar w-full lg:w-80 glass-panel rounded-3xl p-6 flex flex-col gap-6 sticky top-28 border-t-4 border-t-slate-700">
            
            <div class="space-y-3">
                <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest"><i class="fas fa-database ml-1 text-yellow-500"></i> المصدر المعتمد للنطاق</label>
                <select id="source-select" class="vault-input w-full p-3 rounded-xl text-sm appearance-none focus:border-yellow-500" onchange="renderMatrix()"></select>
                <div class="flex justify-center gap-2 mt-2">
                    <button class="mini-circle-btn" onclick="addSource()" title="إضافة مصدر جديد"><i class="fas fa-plus text-emerald-400"></i></button>
                    <button class="mini-circle-btn" onclick="duplicateSource()" title="استنساخ القائمة"><i class="fas fa-copy text-indigo-400"></i></button>
                    <button class="mini-circle-btn border-red-500/30 hover:bg-red-500/10" onclick="deleteSource()" title="مسح المصدر"><i class="fas fa-trash text-red-400"></i></button>
                </div>
            </div>

            <div class="relative">
                <input type="text" id="search-input" class="vault-input w-full p-3 pr-10 rounded-xl text-sm" placeholder="فلترة الوجهات..." oninput="renderMatrix()">
                <i class="fas fa-search absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
            </div>

            <div class="bg-slate-900/80 p-4 rounded-2xl border border-indigo-500/30 flex justify-between items-center relative overflow-hidden">
                <div class="absolute top-0 right-0 w-16 h-full bg-gradient-to-l from-indigo-500/10 to-transparent"></div>
                <div class="flex flex-col gap-1 relative z-10">
                    <div class="font-black text-xs text-indigo-400 flex items-center gap-2"><i class="fas fa-moon"></i> بروتوكول الحارس الليلي</div>
                    <div class="text-[9px] font-bold text-slate-500 tracking-wider">إضافة 0.50 د.أ (يمنع التعديل اليدوي)</div>
                </div>
                <label class="switch relative z-10">
                    <input type="checkbox" id="night-toggle" onchange="toggleNightModeOverride()" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <div class="bg-gradient-to-br from-yellow-500/10 to-transparent p-5 rounded-2xl border border-yellow-500/30 flex flex-col gap-4">
                <div class="text-xs font-black text-yellow-500 text-center flex items-center justify-center gap-2">
                    <i class="fas fa-magic"></i> تفعيل العروض الخاصة
                </div>
                <div class="flex gap-2">
                    <div class="relative flex-1">
                        <input type="number" id="global-discount-input" class="vault-input w-full p-2.5 rounded-lg text-sm text-center font-bold text-yellow-400" placeholder="خصم %" min="0" max="100">
                        <i class="fas fa-percent absolute left-2 top-1/2 -translate-y-1/2 text-yellow-600/50 text-[10px]"></i>
                    </div>
                    <div class="relative flex-1">
                        <input type="number" id="discount-duration" class="vault-input w-full p-2.5 rounded-lg text-sm text-center font-bold text-yellow-400" placeholder="المدة (س)" min="1">
                        <i class="fas fa-hourglass-half absolute left-2 top-1/2 -translate-y-1/2 text-yellow-600/50 text-[10px]"></i>
                    </div>
                </div>
                <button class="bg-yellow-600/20 hover:bg-yellow-500 hover:text-slate-900 text-yellow-500 border border-yellow-500/50 font-bold p-2.5 rounded-lg text-xs transition-all shadow-[0_0_10px_rgba(212,175,55,0.1)]" onclick="applyGlobalDiscount()">تطبيق العرض الآلي 🚀</button>
                <button class="bg-red-500/10 hover:bg-red-500 hover:text-white text-red-400 border border-red-500/30 font-bold p-2.5 rounded-lg text-[10px] transition-all" onclick="revertGlobalDiscount()">إلغاء واسترجاع التسعيرة 🔄</button>
            </div>

            <div class="flex flex-col gap-3 mt-auto pt-4 border-t border-slate-700">
                <button class="bg-slate-800 hover:bg-slate-700 text-white font-bold p-3 rounded-xl text-sm border border-slate-600 transition-all flex items-center justify-center gap-2" onclick="addArea()">
                    <i class="fas fa-map-marker-alt text-emerald-400"></i> إدراج وجهة جديدة
                </button>
                <button id="save-btn" class="neon-button-success p-3 rounded-xl text-sm font-black uppercase tracking-widest flex items-center justify-center gap-2" onclick="saveData()">
                    <i class="fas fa-save"></i> توثيق واعتماد البيانات
                </button>
                <button class="bg-slate-900 hover:bg-slate-800 text-slate-400 font-bold p-3 rounded-xl text-xs border border-slate-800 transition-all flex items-center justify-center gap-2" onclick="window.print()">
                    <i class="fas fa-print"></i> طباعة السجل الرسمي
                </button>
            </div>

        </aside>

        <main class="main-content flex-1 w-full">
            <div class="print-header">
                <h1 style="color:black; margin:0; font-weight:900;">N One Delivery</h1>
                <p style="margin:8px 0; color:#475569; font-size:15px; font-weight:bold;">مصفوفة الأسعار المعتمدة - <span id="print-source-name"></span></p>
            </div>

            <div id="matrix-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5 matrix-container">
                </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, get, child, remove, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC2dqEdbq5cN49leWIcjsTAq6l6KavN_sQ",
            authDomain: "n-one-global.firebaseapp.com",
            databaseURL: "https://n-one-global-default-rtdb.firebaseio.com",
            projectId: "n-one-global",
            storageBucket: "n-one-global.firebasestorage.app",
            messagingSenderId: "627262885530",
            appId: "1:627262885530:web:bc0ae0d748c61ed91b5923"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let pricingData = {};
        let isNightActive = false; 
        let currentUser = null;

        // نظام الإشعارات
        window.showAppToast = function(msg, isError = false) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'app-toast';
            if(isError) toast.style.borderRightColor = '#ef4444';
            toast.innerHTML = (isError ? '<i class="fas fa-exclamation-triangle text-red-500"></i> ' : '<i class="fas fa-gem text-yellow-500"></i> ') + msg;
            container.appendChild(toast);
            setTimeout(() => { if(toast.parentNode) toast.remove(); }, 4000);
        };

        window.onload = async function() {
            const savedUser = localStorage.getItem('current_company_user') || localStorage.getItem('currentUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                document.getElementById('header-company-name').innerText = currentUser.Client_Name || currentUser.name || "الشركة";
            } else {
                showAppToast("الجلسة غير صالحة. يرجى تسجيل الدخول.", true);
                setTimeout(() => window.location.replace('index.html'), 2000);
                return;
            }

            const savedToggle = localStorage.getItem('nOne_night_toggle');
            if (savedToggle !== null) {
                document.getElementById('night-toggle').checked = (savedToggle === 'true');
            }
            
            setupRealtimeFreezeListener(); 
            checkNightMode(); 
            fetchPricesFromCloud();
            
            setInterval(checkNightMode, 60000);
            setInterval(updateTimersUI, 60000); 
            
            // الحارس الذكي الأشرس: يشتغل كل 10 ثواني ويمسح العروض المنتهية فوراً
            setInterval(autoRevertExpiredOffers, 10000); 
        };

        function setupRealtimeFreezeListener() {
            if(!currentUser || (!currentUser.Client_User && !currentUser.user)) return;
            const username = currentUser.Client_User || currentUser.user;
            const myRef = ref(db, `users/${username}`);
            
            onValue(myRef, (snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    if (data.Client_Status === 'paused' || data.status === 'paused') {
                        showAppToast("تم تقييد الوصول. يرجى مراجعة الإدارة.", true);
                        setTimeout(() => {
                            localStorage.clear();
                            window.location.replace('index.html');
                        }, 3000);
                    }
                }
            });
        }

        window.fetchPricesFromCloud = function() {
            const pricesRef = ref(db, 'prices');
            
            onValue(pricesRef, (snapshot) => {
                pricingData = {};
                const myMaster = currentUser.Client_User || currentUser.user;

                if (snapshot.exists()) {
                    const data = Object.values(snapshot.val());
                    
                    data.forEach(r => {
                        if (r.Client_Master === myMaster) {
                            if (!pricingData[r.Price_Source]) pricingData[r.Price_Source] = [];
                            pricingData[r.Price_Source].push({
                                id: r.Price_ID,
                                area: r.Price_Area,
                                price: parseFloat(r.Price_Base || 0),
                                isOffer: r.Price_Offer === 'true',
                                originalPrice: r.Price_Original ? parseFloat(r.Price_Original) : null,
                                offerEndTime: r.Offer_End_Time ? parseInt(r.Offer_End_Time) : null,
                                lastMod: r.Price_Date ? new Date(r.Price_Date).getTime() : Date.now()
                            });
                        }
                    });
                } 
                
                if (Object.keys(pricingData).length === 0) {
                    pricingData["القائمة الأساسية"] = [];
                }
                
                populateSources();
                renderMatrix();
            });
        }

        window.checkNightMode = function() {
            const hour = new Date().getHours();
            const isNightTime = (hour >= 23 || hour < 6);
            const isToggleOn = document.getElementById('night-toggle').checked;
            const shouldBeNight = isNightTime && isToggleOn;

            if (shouldBeNight !== isNightActive) {
                isNightActive = shouldBeNight;
                renderMatrix(); 
            }

            const nav = document.getElementById('main-nav');
            if (isNightActive) {
                nav.style.borderBottomColor = 'var(--night)';
            } else {
                nav.style.borderBottomColor = 'var(--gold)';
            }
        }

        window.toggleNightModeOverride = function() {
            const isChecked = document.getElementById('night-toggle').checked;
            localStorage.setItem('nOne_night_toggle', isChecked);
            checkNightMode();
        }

        window.populateSources = function() {
            const select = document.getElementById('source-select');
            const currentVal = select.value;
            select.innerHTML = '';
            Object.keys(pricingData).forEach(source => {
                const option = document.createElement('option');
                option.value = source;
                option.innerText = source;
                select.appendChild(option);
            });
            if (currentVal && pricingData[currentVal]) select.value = currentVal;
        }

        window.addSource = function() {
            const name = prompt("أدخل اسم المصدر أو نقطة الانطلاق الجديدة:");
            if (name && !pricingData[name]) {
                pricingData[name] = [];
                populateSources();
                document.getElementById('source-select').value = name;
                renderMatrix();
                showAppToast(`تم إنشاء مصدر جديد: ${name}`);
            }
        }

        window.duplicateSource = function() {
            const current = document.getElementById('source-select').value;
            if(!current || !pricingData[current]) return;
            
            const newName = prompt(`سيتم استنساخ الوجهات والأسعار من (${current}). أدخل اسم المصدر الجديد:`);
            if (newName && !pricingData[newName]) {
                pricingData[newName] = JSON.parse(JSON.stringify(pricingData[current]));
                pricingData[newName].forEach(item => { item.id = "PRC_" + Date.now() + Math.floor(Math.random()*1000); });
                populateSources();
                document.getElementById('source-select').value = newName;
                renderMatrix();
                showAppToast("تم استنساخ القائمة بنجاح. لا تنسَ الحفظ.");
            }
        }

        window.deleteSource = function() {
            const current = document.getElementById('source-select').value;
            if(!current || !pricingData[current]) return;

            if (confirm(`تحذير أمني: هل أنت متأكد من حذف قائمة (${current}) نهائياً من قاعدة البيانات؟`)) {
                const idsToDelete = pricingData[current].map(i => i.id);
                idsToDelete.forEach(async (id) => {
                    await remove(ref(db, `prices/${id}`));
                });

                delete pricingData[current];
                if (Object.keys(pricingData).length === 0) pricingData["القائمة الأساسية"] = [];
                populateSources();
                renderMatrix();
                showAppToast("تم حذف المصدر وجميع وجهاته من النظام.");
            }
        }

        window.applyGlobalDiscount = function() {
            const source = document.getElementById('source-select').value;
            const discountInput = document.getElementById('global-discount-input').value;
            const durationInput = document.getElementById('discount-duration').value;

            const discountPercent = parseFloat(discountInput);
            const durationHours = parseFloat(durationInput);

            if(!source || !pricingData[source]) return;
            
            if(isNaN(discountPercent) || discountPercent < 0 || discountPercent > 100) {
                showAppToast("يرجى إدخال نسبة خصم صحيحة (0-100).", true); 
                return;
            }
            if(isNaN(durationHours) || durationHours <= 0) {
                showAppToast("يرجى تحديد مدة العرض بالساعات.", true); 
                return;
            }

            if(confirm(`تفعيل العرض الآلي بنسبة ${discountPercent}% لمدة ${durationHours} ساعة على الوجهات المميزة؟`)) {
                const endTime = Date.now() + (durationHours * 60 * 60 * 1000);
                let affectedCount = 0;
                
                pricingData[source].forEach((item, index) => {
                    if(item.isOffer && item.price > 0) {
                        const basePriceForCalc = item.originalPrice !== null ? item.originalPrice : item.price;
                        item.originalPrice = basePriceForCalc; 
                        
                        let newPrice = basePriceForCalc - (basePriceForCalc * (discountPercent / 100));
                        newPrice = Math.max(0, newPrice); 
                        
                        pricingData[source][index].price = newPrice;
                        pricingData[source][index].offerEndTime = endTime;
                        pricingData[source][index].lastMod = Date.now();
                        affectedCount++;
                    }
                });

                renderMatrix();
                showAppToast(`تم تفعيل العرض لـ ${affectedCount} وجهة. يرجى توثيق البيانات (حفظ).`);
                document.getElementById('global-discount-input').value = '';
                document.getElementById('discount-duration').value = '';
            }
        }

        window.revertGlobalDiscount = function() {
            const source = document.getElementById('source-select').value;
            if(!source || !pricingData[source]) return;

            if(confirm("سيتم إنهاء العروض الحالية واسترجاع الأسعار الأصلية. تأكيد؟")) {
                let revertedCount = 0;
                pricingData[source].forEach((item, index) => {
                    if(item.originalPrice !== null && item.originalPrice !== undefined) {
                        pricingData[source][index].price = item.originalPrice;
                        pricingData[source][index].originalPrice = null;
                        pricingData[source][index].offerEndTime = null;
                        pricingData[source][index].lastMod = Date.now();
                        revertedCount++;
                    }
                });
                renderMatrix();
                if(revertedCount > 0) {
                    showAppToast(`تم إرجاع أسعار ${revertedCount} وجهة. يرجى توثيق البيانات (حفظ).`);
                } else {
                    showAppToast("لا توجد عروض نشطة حالياً لإلغائها.");
                }
            }
        }

        // الحارس الذكي لانتهاء العروض (مزامنة سحابية) الأشرس
        window.autoRevertExpiredOffers = async function() {
            let needsSave = false;
            const now = Date.now();
            const myMaster = currentUser.Client_User || currentUser.user;

            for (const src in pricingData) {
                pricingData[src].forEach((item, index) => {
                    if (item.offerEndTime && now > item.offerEndTime) {
                        if (item.originalPrice !== null) {
                            pricingData[src][index].price = item.originalPrice;
                        }
                        pricingData[src][index].originalPrice = null;
                        pricingData[src][index].offerEndTime = null;
                        pricingData[src][index].lastMod = now;
                        needsSave = true;
                    }
                });
            }

            if (needsSave) {
                renderMatrix();
                // حفظ صامت في الفايربيز عشان نضمن تحديث الأطراف فورا بدون انتظار
                let updates = {};
                for (const source in pricingData) {
                    pricingData[source].forEach(item => {
                         updates[`prices/${item.id}/Price_Base`] = item.price;
                         updates[`prices/${item.id}/Price_Original`] = item.originalPrice !== null ? item.originalPrice : null;
                         updates[`prices/${item.id}/Offer_End_Time`] = item.offerEndTime !== null ? item.offerEndTime : null;
                    });
                }
                try {
                    await update(ref(db), updates);
                    console.log("تم تحديث أسعار العروض المنتهية سحابياً بواسطة الحارس الذكي.");
                } catch(e) {}
            }
        }

        function updateTimersUI() {
            const now = Date.now();
            document.querySelectorAll('.offer-timer').forEach(el => {
                const endTime = parseInt(el.getAttribute('data-endtime'));
                if(endTime) {
                    const diff = endTime - now;
                    if (diff <= 0) {
                        el.innerHTML = '<i class="fas fa-times-circle"></i> انتهى التوقيت';
                        el.style.color = "var(--danger)";
                        el.style.background = "rgba(239, 68, 68, 0.1)";
                        el.style.border = "1px solid rgba(239, 68, 68, 0.3)";
                    } else {
                        const h = Math.floor(diff / (1000 * 60 * 60));
                        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                        el.innerHTML = `<i class="fas fa-hourglass-half"></i> متبقي ${h}س و ${m}د`;
                    }
                }
            });
        }

        window.renderMatrix = function() {
            const source = document.getElementById('source-select').value;
            if(!source) return;
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const container = document.getElementById('matrix-grid');
            
            document.getElementById('print-source-name').innerText = source;
            container.innerHTML = '';

            const areas = pricingData[source] || [];
            const now = Date.now();

            areas.forEach((item, index) => {
                if (searchTerm && !item.area.toLowerCase().includes(searchTerm)) return;

                const basePrice = parseFloat(item.price);
                let displayPrice = basePrice;
                let nightBadgeHtml = '';
                
                let disableInput = isNightActive ? 'disabled title="مغلق. يرجى إيقاف الحارس الليلي لتعديل السعر الأساسي"' : '';
                
                if (isNightActive) {
                    displayPrice += 0.50;
                    nightBadgeHtml = `<span class="night-badge">+0.50 ليلية <i class="fas fa-moon ml-1"></i></span>`;
                }

                let colorClass = 'med-price';
                if (basePrice < 3) colorClass = 'low-price';
                if (basePrice >= 5) colorClass = 'high-price';

                const offerClass = item.isOffer ? 'gold-offer' : '';
                const starClass = item.isOffer ? 'active' : '';

                let trendHtml = '';
                const oneDay = 24 * 60 * 60 * 1000;
                if (item.lastMod && (now - item.lastMod < oneDay)) {
                    trendHtml = '<span class="absolute top-2 left-4 text-[9px] font-bold text-emerald-400 bg-emerald-500/10 px-2 py-0.5 rounded border border-emerald-500/20"><i class="fas fa-chart-line"></i> محدث</span>';
                }

                let priceSectionHtml = `<input type="number" class="price-val-input" value="${displayPrice.toFixed(2)}" step="0.25" ${disableInput} onchange="updateItem('${source}', ${index}, 'price', this.value)">`;
                let timerHtml = '';

                if (item.originalPrice !== null && item.originalPrice !== undefined && item.offerEndTime) {
                    const diff = item.offerEndTime - now;
                    let displayOriginal = item.originalPrice + (isNightActive ? 0.50 : 0);
                    
                    if (diff > 0) {
                        const h = Math.floor(diff / (1000 * 60 * 60));
                        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                        timerHtml = `<div class="offer-timer text-indigo-400 bg-indigo-500/10 border border-indigo-500/20" data-endtime="${item.offerEndTime}"><i class="fas fa-hourglass-half"></i> متبقي ${h}س و ${m}د</div>`;
                    } else {
                        timerHtml = `<div class="offer-timer" data-endtime="${item.offerEndTime}" style="color:var(--danger); background:rgba(239, 68, 68, 0.1); border:1px solid rgba(239, 68, 68, 0.3);"><i class="fas fa-times-circle"></i> انتهى التوقيت</div>`;
                    }
                    
                    priceSectionHtml = `
                        <div class="flex flex-col items-center">
                            <del class="text-red-400 text-[10px] font-black mb-1 opacity-80">${displayOriginal.toFixed(2)}</del>
                            <input type="number" class="price-val-input border-emerald-500/50 text-emerald-400 shadow-[0_0_10px_rgba(16,185,129,0.2)]" value="${displayPrice.toFixed(2)}" step="0.25" ${disableInput} onchange="updateItem('${source}', ${index}, 'price', this.value)">
                        </div>
                    `;
                }

                container.innerHTML += `
                    <div class="price-card glass-panel p-5 rounded-2xl flex items-center justify-between gap-4 ${offerClass}">
                        <div class="color-indicator ${colorClass}"></div>
                        ${trendHtml}
                        ${timerHtml}
                        
                        <div class="flex-1 min-w-0 pr-2">
                            <input type="text" class="area-name-input" placeholder="اسم الوجهة" value="${item.area}" onchange="updateItem('${source}', ${index}, 'area', this.value)">
                            <div class="flex gap-2 mt-3">
                                <button class="mini-circle-btn text-indigo-400" onclick="openMap('${item.area}', '${source}')" title="الخريطة"><i class="fas fa-map-marker-alt"></i></button>
                                <button class="mini-circle-btn btn-offer ${starClass}" onclick="toggleOffer('${source}', ${index})" title="تمييز العرض"><i class="fas fa-star"></i></button>
                                <button class="mini-circle-btn text-red-400 hover:border-red-500/50 hover:bg-red-500/10" onclick="deleteItem('${source}', ${index})" title="إزالة الوجهة"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                        
                        <div class="relative flex flex-col items-center pl-3">
                            ${nightBadgeHtml}
                            ${priceSectionHtml}
                            <span class="text-[10px] font-bold text-slate-500 mt-1">د.أ</span>
                        </div>
                    </div>
                `;
            });
        }

        window.updateItem = function(source, index, field, value) {
            if (field === 'price') {
                if (isNightActive) {
                    showAppToast("مغلق. يرجى إيقاف الحارس الليلي للتعديل.", true);
                    renderMatrix(); 
                    return;
                }
                let newVal = parseFloat(value);
                if (newVal < 0) newVal = 0;
                
                pricingData[source][index].price = newVal;
                pricingData[source][index].lastMod = Date.now();
            } else {
                pricingData[source][index][field] = value;
            }
            renderMatrix();
        }

        window.addArea = function() {
            const source = document.getElementById('source-select').value;
            if(!source) {
                showAppToast("يرجى تحديد المصدر أولاً", true);
                return;
            }
            
            pricingData[source].push({ 
                id: "PRC_" + Date.now() + Math.floor(Math.random()*1000), 
                area: "", price: 0, isOffer: false, 
                originalPrice: null, offerEndTime: null, 
                lastMod: Date.now() 
            });
            renderMatrix();
        }

        window.deleteItem = async function(source, index) {
            if(confirm("إزالة هذه الوجهة سيمنع المنشآت من طلبها. تأكيد؟")) {
                const item = pricingData[source][index];
                if (item.id) {
                    await remove(ref(db, `prices/${item.id}`));
                }
                pricingData[source].splice(index, 1);
                renderMatrix();
            }
        }

        window.toggleOffer = function(source, index) {
            pricingData[source][index].isOffer = !pricingData[source][index].isOffer;
            renderMatrix();
        }

        window.openMap = function(area, source) {
            const query = encodeURIComponent(`${area} ${source} Jordan`);
            window.open(`http://googleusercontent.com/maps.google.com/search?q=${query}`, '_blank');
        }

        window.saveData = async function() {
            const btn = document.getElementById('save-btn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التوثيق';
            
            const myMaster = currentUser.Client_User || currentUser.user;
            
            try {
                const snapshot = await get(ref(db, 'prices'));
                let dbPrices = [];
                if(snapshot.exists()) {
                    dbPrices = Object.values(snapshot.val()).filter(p => p.Client_Master === myMaster);
                }
                
                let currentIds = [];
                
                for (const source in pricingData) {
                    const promises = pricingData[source].map(item => {
                        if (!item.id) item.id = "PRC_" + Date.now() + Math.floor(Math.random()*1000);
                        currentIds.push(item.id);
                        
                        const payload = {
                            Price_ID: item.id,
                            Price_Source: source,
                            Price_Area: item.area || 'وجهة غير مسماة',
                            Price_Base: item.price,
                            Price_Offer: item.isOffer ? 'true' : 'false',
                            Price_Original: item.originalPrice !== null ? item.originalPrice : null,
                            Offer_End_Time: item.offerEndTime !== null ? item.offerEndTime : null,
                            Price_Date: new Date().toISOString(),
                            Client_Master: myMaster
                        };

                        return set(ref(db, `prices/${item.id}`), payload);
                    });
                    
                    await Promise.all(promises);
                }
                
                const existingDbIds = dbPrices.map(p => p.Price_ID);
                const deletedIds = existingDbIds.filter(id => !currentIds.includes(id));
                
                const deletePromises = deletedIds.map(id => remove(ref(db, `prices/${id}`)));
                await Promise.all(deletePromises);
                
                btn.innerHTML = '<i class="fas fa-check-double"></i> تم الاعتماد';
                setTimeout(() => {
                    btn.innerHTML = '<i class="fas fa-save"></i> توثيق واعتماد البيانات';
                    showAppToast("تم حفظ المصفوفة وتعميمها بنجاح 💎");
                }, 1500);
            } catch(e) {
                showAppToast("حدث خطأ أثناء التوثيق", true);
                btn.innerHTML = '<i class="fas fa-save"></i> توثيق واعتماد البيانات';
            }
        }
    </script>
</body>
</html>
