<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N One | مصفوفة الأسعار الماسية (Royal Edition)</title>
    
    <style>
        /* ================= تصميم Diamond Royal ================= */
        :root {
            --primary: #0f172a;
            --gold: #d4af37;
            --gold-light: #fef08a;
            --neon-blue: #0ea5e9;
            --glass: rgba(15, 23, 42, 0.75);
            --glass-border: rgba(212, 175, 55, 0.3);
            --success: #10b981;
            --danger: #ef4444;
            --info: #3b82f6;
            --night: #6366f1; /* لون ليلي نيون */
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #050814; margin: 0; padding: 0; 
            color: #fff; user-select: none; overflow-x: hidden; 
            min-height: 100vh;
        }

        /* ================= الأجسام الطافية في الخلفية ================= */
        .bg-shapes {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden;
        }
        .shape {
            position: absolute;
            background: linear-gradient(135deg, rgba(212,175,55,0.08), rgba(14,165,233,0.08));
            box-shadow: 0 0 20px rgba(212,175,55,0.1);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(212,175,55,0.15);
            animation: float 25s infinite linear;
        }
        .shape:nth-child(1) { width: 150px; height: 150px; top: 10%; left: 5%; border-radius: 20%; transform: rotate(45deg); }
        .shape:nth-child(2) { width: 200px; height: 200px; top: 70%; left: 85%; border-radius: 50%; animation-duration: 30s; animation-direction: reverse; }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
            50% { transform: translateY(-40px) rotate(180deg); opacity: 0.6; }
            100% { transform: translateY(0) rotate(360deg); opacity: 0.3; }
        }

        /* ================= الهيدر الملكي ================= */
        .navbar { 
            background: var(--glass); height: 70px; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000;
            backdrop-filter: blur(20px); transition: 0.5s;
        }
        .navbar.night-mode { border-bottom-color: var(--night); box-shadow: 0 10px 30px rgba(99, 102, 241, 0.2); }

        .brand { font-size: 22px; font-weight: 900; color: white; letter-spacing: 1px; display: flex; align-items: center; gap: 15px; }
        .gold-text { color: var(--gold); text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }
        .company-name-badge { background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 20px; border: 1px solid var(--glass-border); color: var(--gold-light); font-size: 13px; }
        
        .btn-back { background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--glass-border); padding: 8px 20px; border-radius: 12px; cursor: pointer; text-decoration: none; font-size: 13px; font-weight: bold; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .btn-back:hover { background: rgba(212, 175, 55, 0.1); border-color: var(--gold); transform: translateY(-2px); }

        .container { max-width: 1400px; margin: 30px auto; padding: 0 20px; }

        /* ================= الحارس الليلي (زجاجي) ================= */
        .night-control-bar {
            background: var(--glass); padding: 15px 25px; border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4); margin-bottom: 25px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid var(--glass-border); border-right: 4px solid var(--night);
            backdrop-filter: blur(15px); transition: 0.3s;
        }
        .night-control-bar.active { border-color: var(--night); background: rgba(30, 27, 75, 0.8); }
        
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #334155; transition: .4s; border-radius: 34px; border: 1px solid #475569; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        input:checked + .slider { background-color: var(--night); border-color: var(--night); }
        input:checked + .slider:before { transform: translateX(22px); }

        /* ================= لوحة التحكم ================= */
        .controls-panel { 
            background: var(--glass); padding: 25px; border-radius: 20px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); margin-bottom: 30px;
            border: 1px solid var(--glass-border); border-top: 4px solid var(--gold);
            backdrop-filter: blur(15px);
        }
        
        .controls-row { display: flex; justify-content: space-between; align-items: center; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        
        .source-group { display: flex; gap: 12px; align-items: center; flex: 1; min-width: 300px; }
        .source-select { padding: 12px 15px; border: 1px solid var(--glass-border); border-radius: 12px; font-weight: bold; color: white; outline: none; flex: 1; font-size: 14px; background: rgba(0,0,0,0.5); transition: 0.3s; }
        .source-select:focus { border-color: var(--gold); background: rgba(212, 175, 55, 0.05); }
        .source-select option { background: var(--primary); color: white; }
        
        .btn-royal {
            padding: 12px 20px; border: none; border-radius: 12px; font-weight: 900;
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px;
            background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--glass-border); font-size: 13px;
        }
        .btn-royal:hover { transform: translateY(-2px); border-color: var(--gold); background: rgba(212, 175, 55, 0.1); }
        .btn-save { background: linear-gradient(135deg, var(--success), #047857); border: none; box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3); }
        .btn-save:hover { filter: brightness(1.1); border: none; }

        .action-btns { display: flex; gap: 8px; }
        .mini-circle-btn { 
            width: 40px; height: 40px; border-radius: 12px; border: 1px solid var(--glass-border); 
            display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s;
            font-size: 16px; background: rgba(0,0,0,0.3); color: white;
        }
        .mini-circle-btn:hover { transform: translateY(-2px); border-color: var(--gold); background: rgba(212, 175, 55, 0.1); }
        
        .search-box { flex: 2; position: relative; min-width: 250px; }
        .search-input { width: 100%; padding: 14px 45px 14px 15px; border: 1px solid var(--glass-border); border-radius: 12px; outline: none; background: rgba(0,0,0,0.5); font-size: 14px; font-weight: bold; color: white; box-sizing: border-box; transition: 0.3s; }
        .search-input:focus { border-color: var(--gold); background: rgba(212, 175, 55, 0.05); }
        .search-icon { position: absolute; right: 15px; top: 14px; font-size: 16px; color: #94a3b8; }

        /* صندوق الخصم الزجاجي */
        .discount-box { display: flex; align-items: center; gap: 8px; background: rgba(212, 175, 55, 0.05); padding: 8px 15px; border-radius: 12px; border: 1px solid var(--glass-border); flex-wrap: wrap; }
        .discount-input { width: 70px; padding: 10px; border: 1px solid rgba(212,175,55,0.4); border-radius: 8px; outline: none; text-align: center; font-weight: 900; color: white; font-size: 14px; background: rgba(0,0,0,0.5); transition: 0.3s; }
        .discount-input:focus { border-color: var(--gold); background: rgba(212,175,55,0.1); }
        .btn-discount { background: linear-gradient(135deg, var(--gold), #b48608); border: none; color: #000; font-weight: 900; padding: 10px 15px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-size: 13px; }
        .btn-discount:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-revert { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); color: #fca5a5; font-weight: 900; padding: 10px 15px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-size: 13px; }
        .btn-revert:hover { background: var(--danger); color: white; }

        /* ================= كروت المصفوفة (زجاجية) ================= */
        .matrix-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(450px, 1fr)); gap: 20px; }

        .price-card {
            background: rgba(15, 23, 42, 0.6); border-radius: 15px; padding: 18px 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; gap: 15px; transition: 0.3s;
            position: relative; overflow: hidden; backdrop-filter: blur(10px);
        }
        .price-card:hover { transform: translateY(-3px); border-color: rgba(212, 175, 55, 0.5); box-shadow: 0 15px 35px rgba(0,0,0,0.5); }

        .price-card.gold-offer { background: linear-gradient(135deg, rgba(212, 175, 55, 0.15), rgba(15, 23, 42, 0.8)); border: 1px solid var(--gold); }
        .price-card.gold-offer .area-name-input { color: var(--gold-light); }

        .trend-icon { font-size: 11px; position: absolute; top: 5px; left: 15px; font-weight: bold; color: var(--success); }
        .offer-timer { font-size: 11px; font-weight: 900; color: var(--gold-light); position: absolute; bottom: 5px; right: 25px; background: rgba(212, 175, 55, 0.15); padding: 2px 8px; border-radius: 10px; border: 1px solid rgba(212, 175, 55, 0.3); }

        .color-indicator { width: 4px; height: 100%; position: absolute; right: 0; top: 0; }
        .low-price { background: var(--success); box-shadow: 0 0 10px var(--success); } 
        .med-price { background: var(--warning); box-shadow: 0 0 10px var(--warning); } 
        .high-price { background: var(--danger); box-shadow: 0 0 10px var(--danger); } 

        .area-name-input { border: none; font-weight: 900; font-size: 15px; color: white; flex: 1; outline: none; background: transparent; padding: 8px; border-radius: 8px; transition: 0.3s; }
        .area-name-input:focus { background: rgba(255,255,255,0.05); }

        .price-wrapper { position: relative; display: flex; align-items: center; justify-content: center;}
        .price-val-input { width: 80px; padding: 10px; border: 1px solid var(--glass-border); border-radius: 10px; text-align: center; font-weight: 900; color: white; outline: none; font-size: 15px; background: rgba(0,0,0,0.5); transition: 0.3s; }
        .price-val-input:focus { border-color: var(--gold); }
        
        /* تأثير الحقل المقفل */
        .price-val-input:disabled { background: rgba(0,0,0,0.8); color: #64748b; cursor: not-allowed; border-color: var(--danger); opacity: 0.7; }
        
        .night-badge { 
            font-size: 10px; font-weight: 900; background: var(--night); color: white; 
            padding: 3px 8px; border-radius: 8px; position: absolute; 
            top: -12px; right: -10px; white-space: nowrap; pointer-events: none;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.5); z-index: 10;
        }

        .card-tools { display: flex; gap: 8px; align-items: center; }
        .btn-offer.active { color: var(--gold); text-shadow: 0 0 10px rgba(212, 175, 55, 0.8); border-color: var(--gold); }

        #loader-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5,8,20,0.9); z-index: 3000; justify-content: center; align-items: center; flex-direction: column; backdrop-filter: blur(10px); }

        /* ================= تصميم الطباعة ================= */
        @media print {
            body { background: white; color: black; -webkit-print-color-adjust: exact; }
            .bg-shapes, .navbar, .controls-panel, .night-control-bar, .card-tools, .btn-royal, .night-badge, .discount-box, .offer-timer { display: none !important; }
            .container { margin: 0; padding: 0; max-width: 100%; }
            .print-header { display: block; text-align: center; margin-bottom: 20px; border-bottom: 2px solid #000; padding-bottom: 10px; }
            .matrix-container { display: block; column-count: 2; column-gap: 20px; }
            .price-card { background: white; border: 1px solid #ccc; break-inside: avoid; margin-bottom: 10px; padding: 8px 15px; border-radius: 5px; }
            .area-name-input, .price-val-input { color: black; border: none; background: transparent; font-size: 14px; }
            .color-indicator { display: none; }
        }
        .print-header { display: none; }
    </style>
</head>
<body>

    <div class="bg-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <div id="loader-overlay">
        <div style="font-size: 45px; text-shadow: 0 0 20px #d4af37; animation: bounce 1s infinite;">💎</div>
        <div style="color:var(--gold); font-weight:bold; margin-top:15px;" id="loader-msg">جاري تحميل المصفوفة الماسية...</div>
    </div>

    <nav class="navbar" id="main-nav">
        <div class="brand">
            N <span class="gold-text">One</span> Diamond Matrix
            <span id="header-company-name" class="company-name-badge">جاري التحميل...</span>
        </div>
        <a href="client.html" class="btn-back">⬅️ عودة للقيادة</a>
    </nav>

    <div class="container">
        
        <div class="night-control-bar" id="night-banner">
            <div style="display:flex; align-items:center; gap:15px;">
                <span style="font-size:28px; text-shadow: 0 0 15px var(--night);">🌙</span>
                <div>
                    <div style="font-weight:900; font-size:15px; color:white;">الحارس الليلي (تسعير تلقائي)</div>
                    <div style="font-size:12px; font-weight:bold; color:#cbd5e1; margin-top:3px;">
                        إضافة 0.50 د.أ تلقائياً بعد 11:00 م. <span style="color:var(--danger);">(التعديل اليدوي معطل حالياً لضمان دقة الحسابات)</span>
                    </div>
                </div>
            </div>
            <label class="switch">
                <input type="checkbox" id="night-toggle" onchange="toggleNightModeOverride()" checked>
                <span class="slider"></span>
            </label>
        </div>

        <div class="controls-panel">
            <div class="controls-row">
                <div class="source-group">
                    <label style="font-weight:bold; font-size:13px; color:#cbd5e1;">المصدر المعتمد:</label>
                    <select id="source-select" class="source-select" onchange="renderMatrix()"></select>
                    <div class="action-btns">
                        <button class="mini-circle-btn" onclick="addSource()" title="إضافة مصدر">➕</button>
                        <button class="mini-circle-btn" onclick="duplicateSource()" title="نسخ القائمة" style="color:var(--info);">📑</button>
                        <button class="mini-circle-btn" onclick="deleteSource()" title="حذف المصدر" style="color:var(--danger);">🗑️</button>
                    </div>
                </div>

                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="search-input" class="search-input" placeholder="بحث عن منطقة..." oninput="renderMatrix()">
                </div>
            </div>
            
            <div class="controls-row" style="justify-content: flex-end; margin-bottom: 0;">
                <div class="discount-box">
                    <span style="font-size: 18px;" title="الخصم النجمي السحري">🪄</span>
                    <input type="number" id="global-discount-input" class="discount-input" placeholder="خصم %" min="0" max="100">
                    <input type="number" id="discount-duration" class="discount-input" placeholder="ساعات⏳" min="1" style="width: 80px;">
                    <button class="btn-discount" onclick="applyGlobalDiscount()">تطبيق العرض 🪄</button>
                    <button class="btn-revert" onclick="revertGlobalDiscount()">إلغاء وإرجاع 🔄</button>
                </div>
            </div>

            <div class="controls-row" style="justify-content: flex-end; margin-bottom:0; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 15px;">
                <div class="action-btns" style="gap: 15px;">
                    <button class="btn-royal" onclick="addArea()">➕ إضافة منطقة</button>
                    <button class="btn-royal" onclick="window.print()">🖨️ طباعة الكشف</button>
                    <button class="btn-royal btn-save" id="save-btn" onclick="saveData()">💾 حفظ واعتماد الأسعار</button>
                </div>
            </div>
        </div>

        <div class="print-header">
            <h1>N One Delivery - قائمة الأسعار</h1>
            <p>الشركة: <span id="print-company-name"></span> | المصدر: <span id="print-source-name"></span></p>
        </div>

        <div id="matrix-grid" class="matrix-container"></div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, get, set, remove, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC2dqEdbq5cN49leWIcjsTAq6l6KavN_sQ",
            authDomain: "n-one-global.firebaseapp.com",
            databaseURL: "https://n-one-global-default-rtdb.firebaseio.com",
            projectId: "n-one-global",
            storageBucket: "n-one-global.firebasestorage.app",
            messagingSenderId: "627262885530",
            appId: "1:627262885530:web:bc0ae0d748c61ed91b5923"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let sourcesList = []; // مصفوفة لأسماء القوائم لتفادي أخطاء النصوص
        let pricingData = {}; 
        let deletedDbIds = []; // سلة مهملات لتفادي الحذف الفوري الخطير
        let isNightActive = false; 
        let currentUser = null;
        let myMaster = "";

        window.onload = async function() {
            const savedUser = localStorage.getItem('current_company_user') || localStorage.getItem('currentUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                myMaster = currentUser.Client_User || currentUser.user;
                document.getElementById('header-company-name').innerText = currentUser.Client_Name || currentUser.name;
                document.getElementById('print-company-name').innerText = currentUser.Client_Name || currentUser.name;
            } else {
                window.location.replace('index.html');
                return;
            }

            const savedToggle = localStorage.getItem('nOne_night_toggle');
            if (savedToggle !== null) document.getElementById('night-toggle').checked = (savedToggle === 'true');
            
            checkNightMode(); 
            await fetchPricesFromCloud();
            
            setInterval(checkNightMode, 60000);
            setInterval(updateTimersUI, 60000); 
            setInterval(autoRevertExpiredOffers, 60000); 
        };

        // 1. إصلاح مشكلة الأداء: استخدام Query لجلب أسعار الشركة الحالية فقط
        async function fetchPricesFromCloud() {
            showLoader();
            pricingData = {};
            sourcesList = [];
            deletedDbIds = [];
            
            try {
                const pricesRef = ref(db, 'prices');
                const pricesQuery = query(pricesRef, orderByChild('Client_Master'), equalTo(myMaster));
                const snapshot = await get(pricesQuery);

                if (snapshot.exists()) {
                    const data = Object.values(snapshot.val());
                    data.forEach(r => {
                        if (!pricingData[r.Price_Source]) {
                            pricingData[r.Price_Source] = [];
                            sourcesList.push(r.Price_Source);
                        }
                        pricingData[r.Price_Source].push({
                            id: r.Price_ID,
                            area: r.Price_Area,
                            price: parseFloat(r.Price_Base || 0),
                            isOffer: r.Price_Offer === 'true',
                            originalPrice: r.Price_Original ? parseFloat(r.Price_Original) : null,
                            offerEndTime: r.Offer_End_Time ? parseInt(r.Offer_End_Time) : null,
                            lastMod: r.Price_Date ? new Date(r.Price_Date).getTime() : Date.now()
                        });
                    });
                } 
                
                if (Object.keys(pricingData).length === 0) {
                    pricingData["القائمة الافتراضية"] = [];
                    sourcesList.push("القائمة الافتراضية");
                }
                
                populateSources();
                renderMatrix();
                
                // فحص العروض عند أول تحميل للتأكد من عدم وجود عروض منتهية 
                autoRevertExpiredOffers(true); 
                
            } catch(e) {
                alert("خطأ في الاتصال بقاعدة البيانات");
            }
            hideLoader();
        }

        window.checkNightMode = function() {
            const hour = new Date().getHours();
            const isNightTime = (hour >= 23 || hour < 6);
            const isToggleOn = document.getElementById('night-toggle').checked;
            const shouldBeNight = isNightTime && isToggleOn;

            if (shouldBeNight !== isNightActive) {
                isNightActive = shouldBeNight;
                renderMatrix(); 
            }

            const nav = document.getElementById('main-nav');
            const banner = document.getElementById('night-banner');
            if (isNightActive) {
                nav.classList.add('night-mode');
                banner.classList.add('active');
            } else {
                nav.classList.remove('night-mode');
                banner.classList.remove('active');
            }
        }

        window.toggleNightModeOverride = function() {
            localStorage.setItem('nOne_night_toggle', document.getElementById('night-toggle').checked);
            checkNightMode();
        }

        window.populateSources = function() {
            const select = document.getElementById('source-select');
            const currentVal = select.value;
            select.innerHTML = '';
            sourcesList.forEach((source, index) => {
                const option = document.createElement('option');
                option.value = index; // استخدام Index للحماية من الفواصل العليا
                option.innerText = source;
                select.appendChild(option);
            });
            // استعادة التحديد
            if(currentVal !== "" && sourcesList[currentVal]) select.value = currentVal;
        }

        window.addSource = function() {
            const name = prompt("اسم المصدر أو الشركة الجديدة");
            if (name && !pricingData[name]) {
                pricingData[name] = [];
                sourcesList.push(name);
                populateSources();
                document.getElementById('source-select').value = sourcesList.indexOf(name);
                renderMatrix();
            }
        }

        // 2. إصلاح الحذف الفوري: التخزين في سلة المهملات المؤقتة
        window.deleteSource = function() {
            const index = document.getElementById('source-select').value;
            if(index === "") return;
            const sourceName = sourcesList[index];

            if (confirm(`تحذير: سيتم مسح قائمة (${sourceName}) مؤقتاً، اضغط حفظ لتأكيد مسحها من السيرفر.`)) {
                pricingData[sourceName].forEach(item => { if(item.id) deletedDbIds.push(item.id); });
                delete pricingData[sourceName];
                sourcesList.splice(index, 1);
                
                if (sourcesList.length === 0) {
                    pricingData["القائمة الافتراضية"] = [];
                    sourcesList.push("القائمة الافتراضية");
                }
                populateSources();
                renderMatrix();
            }
        }

        window.duplicateSource = function() {
            const index = document.getElementById('source-select').value;
            if(index === "") return;
            const sourceName = sourcesList[index];
            
            const newName = prompt(`نسخ قائمة ${sourceName} إلى مصدر جديد باسم`);
            if (newName && !pricingData[newName]) {
                pricingData[newName] = JSON.parse(JSON.stringify(pricingData[sourceName]));
                pricingData[newName].forEach(item => { item.id = "PRC_" + Date.now() + Math.floor(Math.random()*1000); });
                sourcesList.push(newName);
                populateSources();
                document.getElementById('source-select').value = sourcesList.indexOf(newName);
                renderMatrix();
            }
        }

        window.applyGlobalDiscount = function() {
            const index = document.getElementById('source-select').value;
            if(index === "") return;
            const source = sourcesList[index];

            const discountPercent = parseFloat(document.getElementById('global-discount-input').value);
            const durationHours = parseFloat(document.getElementById('discount-duration').value);

            if(isNaN(discountPercent) || discountPercent < 0 || discountPercent > 100) return alert("يرجى إدخال نسبة خصم صحيحة"); 
            if(isNaN(durationHours) || durationHours <= 0) return alert("حددي كم ساعة رح يستمر العرض"); 

            if(confirm(`سيتم تطبيق خصم ${discountPercent}% لمدة ${durationHours} ساعة على المنشآت المميزة بنجمة متأكدة؟`)) {
                const endTime = Date.now() + (durationHours * 60 * 60 * 1000);
                let affectedCount = 0;
                
                pricingData[source].forEach((item, i) => {
                    if(item.isOffer && item.price > 0) {
                        const basePriceForCalc = item.originalPrice ? item.originalPrice : item.price;
                        item.originalPrice = basePriceForCalc; 
                        
                        let newPrice = basePriceForCalc - (basePriceForCalc * (discountPercent / 100));
                        newPrice = Math.max(0, newPrice); 
                        
                        pricingData[source][i].price = newPrice;
                        pricingData[source][i].offerEndTime = endTime;
                        pricingData[source][i].lastMod = Date.now();
                        affectedCount++;
                    }
                });

                renderMatrix();
                alert(`تم تفعيل العرض لـ ${affectedCount} منطقة.. اضغطي (حفظ) لتثبيته`);
                document.getElementById('global-discount-input').value = '';
                document.getElementById('discount-duration').value = '';
            }
        }

        window.revertGlobalDiscount = function() {
            const index = document.getElementById('source-select').value;
            if(index === "") return;
            const source = sourcesList[index];

            if(confirm("إلغاء العروض وإرجاع الأسعار الأصلية؟")) {
                let revertedCount = 0;
                pricingData[source].forEach((item, i) => {
                    if(item.originalPrice !== null && item.originalPrice !== undefined) {
                        pricingData[source][i].price = item.originalPrice;
                        pricingData[source][i].originalPrice = null;
                        pricingData[source][i].offerEndTime = null;
                        pricingData[source][i].lastMod = Date.now();
                        revertedCount++;
                    }
                });
                renderMatrix();
                if(revertedCount > 0) alert(`تم إرجاع أسعار ${revertedCount} منطقة.. اضغطي حفظ`);
                else alert("لا يوجد عروض فعالة حالياً");
            }
        }

        // 3. إصلاح وهم انتهاء العرض: المزامنة التلقائية مع السيرفر
        function autoRevertExpiredOffers(syncWithServer = false) {
            let needsRender = false;
            let needsSave = false;
            const now = Date.now();
            
            for (const src in pricingData) {
                pricingData[src].forEach((item, index) => {
                    if (item.offerEndTime && now > item.offerEndTime) {
                        if (item.originalPrice !== null) {
                            pricingData[src][index].price = item.originalPrice;
                        }
                        pricingData[src][index].originalPrice = null;
                        pricingData[src][index].offerEndTime = null;
                        pricingData[src][index].lastMod = now;
                        needsRender = true;
                        needsSave = true;
                    }
                });
            }
            if (needsRender) renderMatrix();
            // إذا كان المتصفح مغلقاً لفترة، وبمجرد فتحه وجد عروضاً منتهية، سيقوم برفعها للسيرفر فوراً لحماية الأسعار
            if (needsSave && syncWithServer) {
                console.log("Auto-Sync: Saving expired offers to server.");
                saveData(true); 
            }
        }

        function updateTimersUI() {
            const now = Date.now();
            document.querySelectorAll('.offer-timer').forEach(el => {
                const endTime = parseInt(el.getAttribute('data-endtime'));
                if(endTime) {
                    const diff = endTime - now;
                    if (diff <= 0) {
                        el.innerText = "انتهى العرض ⏳";
                        el.style.color = "var(--danger)";
                        el.style.background = "rgba(239,68,68,0.1)";
                        el.style.borderColor = "rgba(239,68,68,0.3)";
                    } else {
                        const h = Math.floor(diff / (1000 * 60 * 60));
                        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                        el.innerText = `⏳ باقي ${h}س و ${m}د`;
                    }
                }
            });
        }

        window.renderMatrix = function() {
            const sourceIndex = document.getElementById('source-select').value;
            if(sourceIndex === "") return;
            const sourceName = sourcesList[sourceIndex];
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const container = document.getElementById('matrix-grid');
            
            document.getElementById('print-source-name').innerText = sourceName;
            container.innerHTML = '';

            const areas = pricingData[sourceName] || [];
            const now = Date.now();

            // 5. قفل الحارس الليلي بشكل حقيقي لحماية الحسابات
            const inputState = isNightActive ? 'disabled title="قم بإيقاف الحارس الليلي لتتمكن من التعديل"' : '';

            areas.forEach((item, i) => {
                if (searchTerm && !item.area.toLowerCase().includes(searchTerm)) return;

                const basePrice = parseFloat(item.price);
                let displayPrice = basePrice;
                let nightBadgeHtml = '';
                
                if (isNightActive) {
                    displayPrice += 0.50;
                    nightBadgeHtml = `<span class="night-badge">+0.50 ليلي 🌙</span>`;
                }

                let colorClass = 'med-price';
                if (basePrice < 3) colorClass = 'low-price';
                if (basePrice >= 5) colorClass = 'high-price';

                const offerClass = item.isOffer ? 'gold-offer' : '';
                const starClass = item.isOffer ? 'active' : '';

                let trendHtml = '';
                if (item.lastMod && (now - item.lastMod < 86400000)) trendHtml = '<span class="trend-icon">📈 محدث</span>';

                let priceSectionHtml = `<input type="number" class="price-val-input" value="${displayPrice.toFixed(2)}" step="0.25" ${inputState} onchange="updateItem(${sourceIndex}, ${i}, 'price', this.value)">`;
                let timerHtml = '';

                if (item.originalPrice !== null && item.originalPrice !== undefined && item.offerEndTime) {
                    const diff = item.offerEndTime - now;
                    let displayOriginal = item.originalPrice + (isNightActive ? 0.50 : 0);
                    
                    if (diff > 0) {
                        const h = Math.floor(diff / (1000 * 60 * 60));
                        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                        timerHtml = `<div class="offer-timer" data-endtime="${item.offerEndTime}">⏳ باقي ${h}س و ${m}د</div>`;
                    } else {
                        timerHtml = `<div class="offer-timer" data-endtime="${item.offerEndTime}" style="color:var(--danger); background:rgba(239,68,68,0.1); border-color:rgba(239,68,68,0.3);">انتهى العرض ⏳</div>`;
                    }
                    
                    priceSectionHtml = `
                        <div style="display:flex; flex-direction:column; align-items:center;">
                            <del style="color:var(--danger); font-size:12px; font-weight:bold; margin-bottom:2px;">${displayOriginal.toFixed(2)}</del>
                            <input type="number" class="price-val-input" value="${displayPrice.toFixed(2)}" step="0.25" ${inputState} onchange="updateItem(${sourceIndex}, ${i}, 'price', this.value)" style="border-color:var(--success); color:var(--success); box-shadow: 0 0 5px rgba(16, 185, 129, 0.2);">
                        </div>
                    `;
                }

                // 4. الحماية من فواصل الأسماء بتمرير Index بدلاً من النص
                container.innerHTML += `
                    <div class="price-card ${offerClass}">
                        <div class="color-indicator ${colorClass}"></div>
                        ${trendHtml}
                        ${timerHtml}
                        <input type="text" class="area-name-input" value="${item.area}" onchange="updateItem(${sourceIndex}, ${i}, 'area', this.value)">
                        <div class="price-wrapper">
                            ${nightBadgeHtml}
                            ${priceSectionHtml}
                        </div>
                        <div class="card-tools">
                            <span style="font-size:12px; font-weight:bold; color:#64748b; margin-left:10px;">د.أ</span>
                            <button class="mini-circle-btn btn-map" onclick="openMap(${sourceIndex}, ${i})" title="موقع المنطقة">📍</button>
                            <button class="mini-circle-btn btn-offer ${starClass}" onclick="toggleOffer(${sourceIndex}, ${i})" title="تمييز كعرض خاص">⭐</button>
                            <button class="mini-circle-btn" onclick="deleteItem(${sourceIndex}, ${i})" style="color:var(--danger);" title="حذف المنطقة">✕</button>
                        </div>
                    </div>
                `;
            });
        }

        window.updateItem = function(sourceIndex, index, field, value) {
            const sourceName = sourcesList[sourceIndex];
            if (field === 'price') {
                let newVal = parseFloat(value);
                if (newVal < 0) newVal = 0;
                pricingData[sourceName][index].price = newVal;
                pricingData[sourceName][index].lastMod = Date.now();
            } else {
                pricingData[sourceName][index][field] = value;
            }
            renderMatrix();
        }

        window.addArea = function() {
            const sourceIndex = document.getElementById('source-select').value;
            if(sourceIndex === "") return;
            const sourceName = sourcesList[sourceIndex];
            
            pricingData[sourceName].unshift({ 
                id: "PRC_" + Date.now() + Math.floor(Math.random()*1000), 
                area: "منطقة جديدة", price: 0, isOffer: false, 
                originalPrice: null, offerEndTime: null, lastMod: Date.now() 
            });
            renderMatrix();
        }

        window.deleteItem = function(sourceIndex, index) {
            if(confirm("سيتم الحذف مؤقتاً، اضغط حفظ لتأكيد الحذف النهائي.")) {
                const sourceName = sourcesList[sourceIndex];
                const item = pricingData[sourceName][index];
                if (item.id) deletedDbIds.push(item.id);
                pricingData[sourceName].splice(index, 1);
                renderMatrix();
            }
        }

        window.toggleOffer = function(sourceIndex, index) {
            const sourceName = sourcesList[sourceIndex];
            pricingData[sourceName][index].isOffer = !pricingData[sourceName][index].isOffer;
            renderMatrix();
        }

        window.openMap = function(sourceIndex, index) {
            const sourceName = sourcesList[sourceIndex];
            const area = pricingData[sourceName][index].area;
            const query = encodeURIComponent(`${area} ${sourceName} Jordan`);
            window.open(`http://googleusercontent.com/maps.google.com/search?q=${query}`, '_blank');
        }

        // 1. إصلاح ثغرة محو بيانات الزملاء (Save Logic)
        window.saveData = async function(isSilent = false) {
            const btn = document.getElementById('save-btn');
            if(!isSilent) {
                btn.innerHTML = "جاري اللحام والتشفير ⏳";
                btn.style.background = "#f59e0b";
            }
            
            try {
                let promises = [];
                
                // إضافة وتحديث المناطق الموجودة في الشاشة فقط (دون المساس بالشركات الأخرى أو إضافات الزملاء)
                for (const source in pricingData) {
                    pricingData[source].forEach(item => {
                        const payload = {
                            Price_ID: item.id,
                            Price_Source: source,
                            Price_Area: item.area,
                            Price_Base: item.price,
                            Price_Offer: item.isOffer ? 'true' : 'false',
                            Price_Original: item.originalPrice !== null ? item.originalPrice : null,
                            Offer_End_Time: item.offerEndTime !== null ? item.offerEndTime : null,
                            Price_Date: new Date(item.lastMod).toISOString(),
                            Client_Master: myMaster
                        };
                        promises.push(set(ref(db, `prices/${item.id}`), payload));
                    });
                }
                
                // حذف الملفات التي ضغط المستخدم على زر مسحها في هذه الجلسة فقط
                deletedDbIds.forEach(id => {
                    promises.push(remove(ref(db, `prices/${id}`)));
                });
                
                await Promise.all(promises);
                deletedDbIds = []; 
                
                if(!isSilent) {
                    btn.innerHTML = "تم التعميم 📡";
                    btn.style.background = "#047857";
                    setTimeout(() => {
                        btn.innerHTML = "💾 حفظ واعتماد الأسعار";
                        btn.style.background = "linear-gradient(135deg, var(--success), #047857)";
                        alert("تم حفظ المصفوفة وتثبيتها في الخزنة الحديدية بنجاح ✅");
                    }, 1500);
                }
            } catch(e) {
                if(!isSilent) {
                    alert("حدث خطأ أثناء الحفظ تأكد من الإنترنت");
                    btn.innerHTML = "💾 حفظ واعتماد الأسعار";
                    btn.style.background = "linear-gradient(135deg, var(--success), #047857)";
                }
            }
        }

        function showLoader() { document.getElementById('loader-overlay').style.display = 'flex'; }
        function hideLoader() { document.getElementById('loader-overlay').style.display = 'none'; }
    </script>
</body>
</html>
